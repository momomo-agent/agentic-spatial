<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>agentic-spatial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --border: rgba(255,255,255,0.06);
  --border-hi: rgba(255,255,255,0.12);
  --text: #e0e0e8;
  --text-dim: #6b6b7b;
  --accent: #4dc9f6;
  --accent-dim: rgba(77,201,246,0.15);
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Inter', system-ui, sans-serif;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px; overflow: hidden; }
a { color: var(--accent); }

/* Layout */
#app { display: flex; height: 100vh; }
#left { width: 280px; border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
#center { flex: 1; position: relative; }
#right { width: 0; border-left: 1px solid var(--border); overflow-y: auto; overflow-x: hidden; transition: width 0.2s; flex-shrink: 0; }
#right.open { width: 320px; }

/* Left panel */
.panel-section { padding: 16px; border-bottom: 1px solid var(--border); }
.panel-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 8px; font-weight: 500; }

/* Drop zone */
#dropzone {
  border: 1px dashed var(--border-hi);
  border-radius: 4px;
  padding: 24px 16px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  color: var(--text-dim);
  font-size: 12px;
  position: relative;
}
#dropzone.dragover { border-color: var(--accent); background: var(--accent-dim); }
#dropzone.has-images { padding: 8px; }
#file-input { display: none; }
#thumbs { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
#thumbs img { width: 48px; height: 48px; object-fit: cover; border-radius: 2px; border: 1px solid var(--border); }

/* Inputs */
.field { margin-bottom: 8px; }
.field input, .field select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border-hi);
  color: var(--text);
  padding: 6px 8px;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 12px;
  outline: none;
}
.field input:focus, .field select:focus { border-color: var(--accent); }
.field select { appearance: none; cursor: pointer; }

/* Button */
#analyze-btn {
  width: 100%;
  padding: 8px;
  background: var(--accent);
  color: #0a0a0f;
  border: none;
  border-radius: 3px;
  font-family: var(--sans);
  font-weight: 500;
  font-size: 13px;
  cursor: pointer;
  transition: opacity 0.15s;
}
#analyze-btn:hover { opacity: 0.85; }
#analyze-btn:disabled { opacity: 0.4; cursor: default; }

/* Log */
#log { flex: 1; overflow-y: auto; padding: 12px 16px; font-family: var(--mono); font-size: 11px; line-height: 1.6; }
#log .entry { color: var(--text-dim); }
#log .entry.active { color: var(--accent); }
#log .entry.error { color: #f64d4d; }

/* 3D controls */
#view-controls {
  position: absolute; top: 12px; right: 12px; z-index: 10;
  display: flex; gap: 6px;
}
.view-btn {
  background: rgba(18,18,26,0.85);
  border: 1px solid var(--border-hi);
  color: var(--text-dim);
  padding: 4px 10px;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
  backdrop-filter: blur(8px);
}
.view-btn:hover { color: var(--text); border-color: var(--accent); }
.view-btn.active { color: var(--accent); border-color: var(--accent); }

/* Right panel */
#right .panel-section:first-child { border-top: none; }
.obj-item {
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
}
.obj-item:last-child { border-bottom: none; }
.obj-item:hover { color: var(--accent); }
.obj-item.selected { color: var(--accent); }
.obj-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.obj-name { font-size: 12px; }
.obj-type { font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-left: auto; }
.detail-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 11px; }
.detail-key { color: var(--text-dim); }
.detail-val { font-family: var(--mono); }
.relation-item { font-size: 11px; color: var(--text-dim); padding: 3px 0; line-height: 1.4; }
#json-toggle {
  font-family: var(--mono); font-size: 11px; color: var(--accent);
  background: none; border: none; cursor: pointer; padding: 0;
}
#json-raw { white-space: pre-wrap; font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-top: 8px; max-height: 300px; overflow-y: auto; display: none; word-break: break-all; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">
  <!-- Left Panel -->
  <div id="left">
    <div class="panel-section">
      <div class="panel-label">Images</div>
      <div id="dropzone" onclick="document.getElementById('file-input').click()">
        Drop images here or click to browse
        <input id="file-input" type="file" accept="image/*" multiple>
      </div>
      <div id="thumbs"></div>
    </div>
    <div class="panel-section">
      <div class="panel-label">Configuration</div>
      <div class="field"><input id="api-key" type="text" placeholder="API Key"></div>
      <div class="field"><input id="model-input" type="text" placeholder="Model" value="claude-sonnet-4-20250514"></div>
      <div class="field"><input id="base-url" type="text" placeholder="Base URL" value="https://api.anthropic.com"></div>
      <div class="field"><input id="proxy-url" type="text" placeholder="Proxy URL (optional)" value="https://proxy.link2web.site"></div>
      <button id="analyze-btn" disabled>Analyze</button>
      <button id="demo-btn" style="width:100%;padding:8px;background:transparent;color:var(--text-dim);border:1px solid var(--border-hi);border-radius:3px;font-family:var(--sans);font-size:12px;cursor:pointer;margin-top:6px">Load Demo Scene</button>
    </div>
    <div id="log"></div>
  </div>

  <!-- Center: 3D View -->
  <div id="center">
    <canvas id="canvas"></canvas>
    <div id="view-controls">
      <button class="view-btn active" data-view="perspective">3D</button>
      <button class="view-btn" data-view="top">Top</button>
      <button class="view-btn" data-view="inspector" title="Toggle inspector">Data</button>
    </div>
  </div>

  <!-- Right Panel (Inspector) -->
  <div id="right">
    <div class="panel-section">
      <div class="panel-label">Room</div>
      <div id="room-info"><span style="color:var(--text-dim)">No data yet</span></div>
    </div>
    <div class="panel-section">
      <div class="panel-label">Objects</div>
      <div id="object-list"></div>
    </div>
    <div class="panel-section">
      <div class="panel-label">People</div>
      <div id="people-list"></div>
    </div>
    <div class="panel-section">
      <div class="panel-label">Relations</div>
      <div id="relations-list"></div>
    </div>
    <div class="panel-section">
      <div class="panel-label">Raw JSON <button id="json-toggle">show</button></div>
      <div id="json-raw"></div>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.162.0",
    "three/addons/": "https://esm.sh/three@0.162.0/examples/jsm/"
  },
  "scopes": {
    "../src/": {
      "../../agentic-core/docs/agentic-agent.js": "https://cdn.jsdelivr.net/gh/momomo-agent/agentic-core@main/docs/agentic-agent.js"
    }
  }
}
</script>
<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import { reconstructSpace } from '../src/index.js'

// ── State ──
let sceneData = null
let loadedImages = []
let meshMap = new Map()  // id -> mesh
let selectedId = null

// ── Three.js Setup ──
const canvas = document.getElementById('canvas')
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true })
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
renderer.setClearColor(0x0a0a0f, 1)

const scene = new THREE.Scene()
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100)
camera.position.set(6, 5, 6)
camera.lookAt(0, 0, 0)

const controls = new OrbitControls(camera, canvas)
controls.enableDamping = true
controls.dampingFactor = 0.08
controls.target.set(0, 0, 0)

// Lights
scene.add(new THREE.AmbientLight(0x4466aa, 0.6))
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8)
dirLight.position.set(5, 10, 5)
scene.add(dirLight)

function resize() {
  const c = document.getElementById('center')
  const w = c.clientWidth, h = c.clientHeight
  renderer.setSize(w, h)
  camera.aspect = w / h
  camera.updateProjectionMatrix()
}
window.addEventListener('resize', resize)
resize()

function animate() {
  requestAnimationFrame(animate)
  controls.update()
  renderer.render(scene, camera)
}
animate()

// ── LocalStorage persistence ──
const LS_KEY = 'agentic-spatial-config'
const configFields = ['api-key', 'model-input', 'base-url', 'proxy-url']

function loadConfig() {
  try {
    const saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}')
    for (const id of configFields) {
      if (saved[id]) document.getElementById(id).value = saved[id]
    }
  } catch {}
}

function saveConfig() {
  const cfg = {}
  for (const id of configFields) cfg[id] = document.getElementById(id).value
  localStorage.setItem(LS_KEY, JSON.stringify(cfg))
}

loadConfig()
configFields.forEach(id => document.getElementById(id).addEventListener('input', saveConfig))

// ── Image Handling ──
const dropzone = document.getElementById('dropzone')
const fileInput = document.getElementById('file-input')
const thumbs = document.getElementById('thumbs')
const analyzeBtn = document.getElementById('analyze-btn')

function readFileAsBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader()
    reader.onload = () => {
      const base64 = reader.result.split(',')[1]
      resolve({ data: base64, name: file.name, media_type: file.type || 'image/jpeg', file })
    }
    reader.readAsDataURL(file)
  })
}

async function addFiles(files) {
  for (const f of files) {
    if (!f.type.startsWith('image/')) continue
    const img = await readFileAsBase64(f)
    loadedImages.push(img)
    const el = document.createElement('img')
    el.src = URL.createObjectURL(f)
    thumbs.appendChild(el)
  }
  if (loadedImages.length) {
    dropzone.classList.add('has-images')
    dropzone.textContent = `${loadedImages.length} image(s)`
    dropzone.appendChild(fileInput)
  }
  updateBtn()
}

dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover') })
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'))
dropzone.addEventListener('drop', (e) => { e.preventDefault(); dropzone.classList.remove('dragover'); addFiles(e.dataTransfer.files) })
fileInput.addEventListener('change', () => addFiles(fileInput.files))

function updateBtn() {
  analyzeBtn.disabled = !(loadedImages.length && document.getElementById('api-key').value.trim() && document.getElementById('base-url').value.trim() && document.getElementById('model-input').value.trim())
}
document.getElementById('api-key').addEventListener('input', updateBtn)
document.getElementById('base-url').addEventListener('input', updateBtn)
document.getElementById('model-input').addEventListener('input', updateBtn)

// ── Logging ──
const logEl = document.getElementById('log')
function log(msg, cls = '') {
  const d = document.createElement('div')
  d.className = 'entry ' + cls
  d.textContent = msg
  logEl.appendChild(d)
  logEl.scrollTop = logEl.scrollHeight
}

// ── Analyze ──
analyzeBtn.addEventListener('click', async () => {
  const apiKey = document.getElementById('api-key').value.trim()
  const model = document.getElementById('model-input').value.trim()
  const baseUrl = document.getElementById('base-url').value.trim()
  const proxyUrl = document.getElementById('proxy-url').value.trim() || undefined
  if (!loadedImages.length || !apiKey) return

  analyzeBtn.disabled = true
  logEl.innerHTML = ''
  log('Starting spatial reconstruction...', 'active')

  try {
    sceneData = await reconstructSpace({
      images: loadedImages,
      apiKey,
      model,
      baseUrl,
      proxyUrl,
      onProgress: (step, detail) => {
        if (step === 'step1') log(detail.message, 'active')
        else if (step === 'step1_done') log(`Analysis complete (${detail.length} chars)`)
        else if (step === 'step2') log(detail.message, 'active')
        else if (step === 'step2_status') log(detail.message)
        else if (step === 'done') log(`Done in ${(detail.scene.meta.elapsedMs / 1000).toFixed(1)}s`)
      }
    })

    log('Rendering 3D scene...')
    renderScene(sceneData)
    populateInspector(sceneData)
    document.getElementById('right').classList.add('open')
    document.querySelector('[data-view="inspector"]').classList.add('active')
    resize()
    log('Complete.')
  } catch (e) {
    log(`Error: ${e.message}`, 'error')
    console.error(e)
  }

  analyzeBtn.disabled = false
})

// ── 3D Rendering ──
function clearScene() {
  const toRemove = []
  scene.traverse((obj) => { if (obj.userData.spatial) toRemove.push(obj) })
  toRemove.forEach((obj) => { obj.parent.remove(obj); obj.geometry?.dispose(); obj.material?.dispose?.() })
  meshMap.clear()
}

function renderScene(data) {
  clearScene()
  const room = data.room
  const W = room.estimatedWidth || 6
  const D = room.estimatedDepth || 4
  const H = 3  // assume 3m ceiling

  // Room wireframe
  const roomGeo = new THREE.BoxGeometry(W, H, D)
  const roomEdges = new THREE.EdgesGeometry(roomGeo)
  const roomLine = new THREE.LineSegments(roomEdges, new THREE.LineBasicMaterial({ color: 0x333344, linewidth: 1 }))
  roomLine.position.set(W / 2, H / 2, D / 2)
  roomLine.userData.spatial = true
  scene.add(roomLine)

  // Floor grid
  const gridHelper = new THREE.GridHelper(Math.max(W, D), Math.max(W, D) * 2, 0x1a1a2e, 0x1a1a2e)
  gridHelper.position.set(W / 2, 0.01, D / 2)
  gridHelper.userData.spatial = true
  scene.add(gridHelper)

  // Floor plane (subtle)
  const floorGeo = new THREE.PlaneGeometry(W, D)
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x0e0e18, roughness: 1 })
  const floor = new THREE.Mesh(floorGeo, floorMat)
  floor.rotation.x = -Math.PI / 2
  floor.position.set(W / 2, 0, D / 2)
  floor.userData.spatial = true
  scene.add(floor)

  // Objects
  for (const obj of data.objects || []) {
    const px = (obj.x || 0.5) * W
    const pz = (obj.z || 0.5) * D
    const py = (obj.y || 0) * H
    const ow = (obj.width || 0.1) * W
    const od = (obj.depth || 0.1) * D
    const oh = Math.min(ow, od) * 0.6

    const color = obj.color ? parseInt(obj.color.replace('#', ''), 16) : 0x4488aa
    const geo = new THREE.BoxGeometry(ow, oh, od)
    const edges = new THREE.EdgesGeometry(geo)
    const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.7 })
    const mesh = new THREE.LineSegments(edges, mat)
    mesh.position.set(px, py + oh / 2, pz)
    mesh.userData = { spatial: true, id: obj.id, type: 'object', data: obj }
    scene.add(mesh)
    meshMap.set(obj.id, mesh)

    // Label sprite
    addLabel(obj.name || obj.label || obj.id, px, py + oh + 0.3, pz)
  }

  // People — spread overlapping positions
  const peoplePositions = []
  for (const p of data.people || []) {
    let px = (p.x || 0.5) * W
    let pz = (p.z || 0.5) * D
    // Jitter if too close to existing person
    const MIN_DIST = 0.4
    let attempts = 0
    while (attempts < 20) {
      const tooClose = peoplePositions.some(([ox, oz]) => Math.hypot(px - ox, pz - oz) < MIN_DIST)
      if (!tooClose) break
      const angle = Math.random() * Math.PI * 2
      const dist = MIN_DIST + Math.random() * 0.2
      px = (p.x || 0.5) * W + Math.cos(angle) * dist
      pz = (p.z || 0.5) * D + Math.sin(angle) * dist
      // Clamp to room
      px = Math.max(0.2, Math.min(W - 0.2, px))
      pz = Math.max(0.2, Math.min(D - 0.2, pz))
      attempts++
    }
    peoplePositions.push([px, pz])
    const py = (p.y || 0) * H
    const isStanding = (p.pose || '').toLowerCase().includes('stand')
    const ph = isStanding ? 0.7 : 0.45

    const coneGeo = new THREE.ConeGeometry(0.1, ph, 8)
    const coneMat = new THREE.MeshStandardMaterial({ color: 0x4dc9f6, roughness: 0.5, transparent: true, opacity: 0.8 })
    const cone = new THREE.Mesh(coneGeo, coneMat)
    cone.position.set(px, py + ph / 2, pz)
    cone.userData = { spatial: true, id: p.id, type: 'person', data: p }
    scene.add(cone)
    meshMap.set(p.id, cone)

    // Gaze line
    const gazeRad = ((p.gazeDegrees || 0) - 90) * Math.PI / 180
    const gazeLen = 2
    const gx = Math.cos(gazeRad) * gazeLen
    const gz = Math.sin(gazeRad) * gazeLen
    const gazeMat = new THREE.LineDashedMaterial({ color: 0x4dc9f6, dashSize: 0.15, gapSize: 0.1, transparent: true, opacity: 0.5 })
    const gazeGeo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(px, py + ph * 0.8, pz),
      new THREE.Vector3(px + gx, py + ph * 0.8, pz + gz)
    ])
    const gazeLine = new THREE.Line(gazeGeo, gazeMat)
    gazeLine.computeLineDistances()
    gazeLine.userData.spatial = true
    scene.add(gazeLine)

    addLabel(p.name || p.id, px, py + ph + 0.3, pz)
  }

  // Camera markers
  for (const cam of data.cameras || []) {
    const cx = (cam.estimatedPosition?.x || 0.5) * W
    const cz = (cam.estimatedPosition?.z || 0.5) * D
    const camGeo = new THREE.OctahedronGeometry(0.15)
    const camMat = new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0xff8844, emissiveIntensity: 0.3 })
    const camMesh = new THREE.Mesh(camGeo, camMat)
    camMesh.position.set(cx, 1.5, cz)
    camMesh.userData.spatial = true
    scene.add(camMesh)
    addLabel(`cam-${cam.index}`, cx, 2.0, cz)
  }

  // Center camera on room
  controls.target.set(W / 2, H / 3, D / 2)
  camera.position.set(W * 1.2, H * 1.5, D * 1.2)
  controls.update()
}

function addLabel(text, x, y, z) {
  const canvas2d = document.createElement('canvas')
  canvas2d.width = 256
  canvas2d.height = 64
  const ctx = canvas2d.getContext('2d')
  ctx.font = '24px Inter, system-ui, sans-serif'
  ctx.fillStyle = '#e0e0e8'
  ctx.textAlign = 'center'
  ctx.fillText(text.replace(/_/g, ' '), 128, 40)

  const texture = new THREE.CanvasTexture(canvas2d)
  texture.minFilter = THREE.LinearFilter
  const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.7, depthTest: false })
  const sprite = new THREE.Sprite(spriteMat)
  sprite.position.set(x, y, z)
  sprite.scale.set(1.5, 0.4, 1)
  sprite.userData.spatial = true
  scene.add(sprite)
}

// ── Raycasting (click to select) ──
const raycaster = new THREE.Raycaster()
const mouse = new THREE.Vector2()

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect()
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1
  raycaster.setFromCamera(mouse, camera)
  const hits = raycaster.intersectObjects(scene.children.filter(c => c.userData.id))
  if (hits.length) selectItem(hits[0].object.userData.id)
})

function selectItem(id) {
  // Deselect previous
  if (selectedId && meshMap.has(selectedId)) {
    const prev = meshMap.get(selectedId)
    if (prev.material.emissive) prev.material.emissiveIntensity = 0
  }
  selectedId = id
  // Highlight new
  if (meshMap.has(id)) {
    const mesh = meshMap.get(id)
    if (mesh.material.emissive) {
      mesh.material.emissive.set(0x4dc9f6)
      mesh.material.emissiveIntensity = 0.4
    }
    // Animate camera to focus
    const target = mesh.position.clone()
    animateCamera(target)
  }
  // Update inspector selection
  document.querySelectorAll('.obj-item').forEach(el => {
    el.classList.toggle('selected', el.dataset.id === id)
  })
  showDetail(id)
}

function animateCamera(target) {
  const offset = new THREE.Vector3(2, 2, 2)
  const dest = target.clone().add(offset)
  const startPos = camera.position.clone()
  const startTarget = controls.target.clone()
  let t = 0
  function step() {
    t += 0.04
    if (t > 1) t = 1
    const ease = t * (2 - t)
    camera.position.lerpVectors(startPos, dest, ease)
    controls.target.lerpVectors(startTarget, target, ease)
    controls.update()
    if (t < 1) requestAnimationFrame(step)
  }
  step()
}

// ── Inspector ──
function populateInspector(data) {
  // Room
  const ri = document.getElementById('room-info')
  const room = data.room || {}
  ri.innerHTML = `
    <div class="detail-row"><span class="detail-key">Shape</span><span class="detail-val">${room.shape || '—'}</span></div>
    <div class="detail-row"><span class="detail-key">Width</span><span class="detail-val">${room.estimatedWidth || '?'}m</span></div>
    <div class="detail-row"><span class="detail-key">Depth</span><span class="detail-val">${room.estimatedDepth || '?'}m</span></div>
    ${(room.walls || []).map(w => {
      if (typeof w === 'string') return `<div class="detail-row"><span class="detail-val">${w}</span></div>`
      const key = w.side || w.direction || w.name || w.wall || Object.keys(w)[0] || '—'
      const val = w.features || w.description || w.details || (typeof Object.values(w)[1] === 'string' ? Object.values(w)[1] : '—')
      return `<div class="detail-row"><span class="detail-key">${key}</span><span class="detail-val">${Array.isArray(val) ? val.join(', ') : val}</span></div>`
    }).join('')}
  `

  // Objects
  const ol = document.getElementById('object-list')
  ol.innerHTML = ''
  for (const obj of data.objects || []) {
    const item = document.createElement('div')
    item.className = 'obj-item'
    item.dataset.id = obj.id
    item.innerHTML = `<span class="obj-dot" style="background:${obj.color || '#4488aa'}"></span><span class="obj-name">${(obj.name || obj.label || obj.description || obj.id).replace(/_/g, ' ')}</span><span class="obj-type">${obj.type || obj.category || ''}</span>`
    item.addEventListener('click', () => selectItem(obj.id))
    ol.appendChild(item)
  }

  // People
  const pl = document.getElementById('people-list')
  pl.innerHTML = ''
  for (const p of data.people || []) {
    const item = document.createElement('div')
    item.className = 'obj-item'
    item.dataset.id = p.id
    item.innerHTML = `<span class="obj-dot" style="background:#4dc9f6"></span><span class="obj-name">${(p.name || p.id).replace(/_/g, ' ')}</span><span class="obj-type">${p.pose || ''}</span>`
    item.addEventListener('click', () => selectItem(p.id))
    pl.appendChild(item)
  }

  // Relations
  const rl = document.getElementById('relations-list')
  rl.innerHTML = (data.relations || []).map(r => {
    const text = typeof r === 'string' ? r : (r.description || r.text || r.relation || JSON.stringify(r))
    return `<div class="relation-item">${text}</div>`
  }).join('')

  // JSON
  document.getElementById('json-raw').textContent = JSON.stringify(data, null, 2)
}

function showDetail(id) {
  if (!sceneData) return
  const obj = [...(sceneData.objects || []), ...(sceneData.people || [])].find(o => o.id === id)
  if (!obj) return
  // Could expand a detail pane — for now the list selection is enough
}

// ── View Controls ──
document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const view = btn.dataset.view
    if (view === 'inspector') {
      const right = document.getElementById('right')
      const isOpen = right.classList.contains('open')
      if (isOpen) {
        right.classList.remove('open')
        btn.classList.remove('active')
      } else {
        right.classList.add('open')
        btn.classList.add('active')
      }
      resize()
      return
    }
    document.querySelectorAll('.view-btn:not([data-view="inspector"])').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')

    if (!sceneData) return
    const W = sceneData.room?.estimatedWidth || 6
    const D = sceneData.room?.estimatedDepth || 4
    const H = 3

    if (view === 'top') {
      camera.position.set(W / 2, 12, D / 2)
      controls.target.set(W / 2, 0, D / 2)
    } else {
      camera.position.set(W * 1.2, H * 1.5, D * 1.2)
      controls.target.set(W / 2, H / 3, D / 2)
    }
    controls.update()
  })
})

// ── JSON toggle ──
document.getElementById('json-toggle').addEventListener('click', () => {
  const el = document.getElementById('json-raw')
  const btn = document.getElementById('json-toggle')
  if (el.style.display === 'block') { el.style.display = 'none'; btn.textContent = 'show' }
  else { el.style.display = 'block'; btn.textContent = 'hide' }
})
